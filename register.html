      rel="stylesheet"
    />

    <link href="styles/styles.css" rel="stylesheet" />
    <link href="styles/register-styles.css" rel="stylesheet" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    />
  </head>

  <body>

        <a class="navbar-brand px-3" href="index.html">
          <img
            src="images/fmi-logo.png"
            width="45"
            height="auto"
            class="d-inline-block align-text-top"
          />
        </a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto text-center">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Начало</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="register.html">Регистрация</a>

              <a class="nav-link" href="schedule.html">График</a>

          </ul>

    <section class="register-wrapper">
      <div class="container form-container">
        <h1 class="form-title text-center mb-4">Регистрация за участие</h1>

        <form id="contactForm">
          <div class="row g-3">
            <div class="col-12">
              <!-- <label class="form-label">Име, презиме, фамилия</label> -->
              <div class="row g-2">
                <div class="col-12 col-md-4">
                  <input
                    type="text"
                    id="first-name"
                    class="form-control"
                    placeholder="Име"
                    required
                  />
                </div>
                <div class="col-12 col-md-4">
                  <input
                    type="text"
                    id="surname"
                    class="form-control"
                    placeholder="Презиме"
                    required
                  />
                </div>
                <div class="col-12 col-md-4">
                  <input
                    type="text"
                    id="last-name"
                    class="form-control"
                    placeholder="Фамилия"
                    required
                  />
                </div>
              </div>
            </div>

            <div class="col-12">
              <input
                type="text"
                id="email"
                class="form-control"
                placeholder="Имейл"
                required
              />
            </div>

            <div class="col-12 col-md-6">
              <select class="form-select" id="status" required>
                <option value="" disabled selected hidden>
                  Статут на участника
                </option>
                <option>студент-бакалавър</option>
                <option>студент-магистър</option>
                <option>докторант</option>
                <option>млад учен</option>
              </select>
            </div>

            <div class="col-12 col-md-6">
              <input
                type="text"
                id="speciality"
                class="form-control"
                placeholder="Специалност"
                required
              />
            </div>

            <div class="col-12 col-md-6">
              <input
                type="text"
                id="institution"
                class="form-control"
                placeholder="Учебна институция"
                required
              />
              <div
                id="institution-list"
                class="container autocomplete-list"
              ></div>
            </div>

            <div class="col-12 col-md-6">
              <input
                type="text"
                id="consultant"
                class="form-control"
                placeholder="Научен консултант"
                required
              />
            </div>

            <div class="col-12">
              <input
                type="text"
                id="topic"
                class="form-control"
                placeholder="Тема на научния доклад"
                required
              />
            </div>

            <div class="col-12 col-md-6">
              <select class="form-select" id="thematic-direction" required>
                <option value="" disabled selected hidden>
                  Тематично направление
                </option>
                <option>Информатика и компютърни науки</option>
                <option>Математика и приложна математика</option>
                <option>Обучение по математика и информатика</option>
              </select>
            </div>

            <div class="col-12 col-md-6">
              <input
                type="text"
                id="software"
                class="form-control"
                placeholder="Необходим софтуерен продукт"
                required
              />
            </div>

            <div class="col-12">
              <textarea
                id="summary"
                class="form-control"
                rows="4"
                placeholder="Резюме на научния доклад"
                required
              ></textarea>
            </div>

            <div
              class="col-12 d-flex register-d-flex justify-content-center gap-3 mt-4"
            >
              <button
                type="submit"
                class="btn btn-primary register-btn-primary register-btn px-4"
              >
                Изпрати
              </button>
              <button
                type="reset"
                class="btn btn-outline-secondary register-btn-outline-secondary register-btn px-4"
              >
                Нулирай
              </button>
            </div>
          </div>
          <hr />
          <div class="text-center my-4">
            <a
              href="https://blueonn33.github.io/scientific-conference-participants/"
              target="_blank"
              class="btn btn-lg btn-participants px-4 py-2 shadow-sm fw-semibold"
            >
              Регистрирани участници
            </a>
          </div>
        </form>
      </div>
    </section>

    <div id="footer"></div>

    <script>
      fetch("footer.html")
        .then((response) => response.text())
        .then((html) => {
          document.getElementById("footer").innerHTML = html;
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="script.js"></script>

</html>
